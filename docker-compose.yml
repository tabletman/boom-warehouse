# Boom Warehouse — Local Development / n8n
# WordPress + WooCommerce runs on Hostinger (not Docker)
# This compose file is for n8n automation only (deploy to Hostinger VPS)
# For full n8n production config, see: n8n/docker-compose.yml

version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    ports: ['5678:5678']
    volumes: ['n8n_data:/home/node/.n8n']
    environment:
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: America/New_York
    restart: unless-stopped

volumes:
  n8n_data:
